<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>En memoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --hueso:#FAF6F0;--hueso-osc:#F1E9DD;--terracota:#7A4A3A;--terracota-osc:#5E3A2D;
  --dorado:#C9A24B;--carbon:#2B2723;--carbon-suave:#56504A;--sauce:#5C6B57;
  --sauce-osc:#43503F;--borde:#E3D9C8;--blanco:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--hueso);color:var(--carbon);font-family:'Inter',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;}

/* HERO */
.hero{position:relative;padding:52px 24px 40px;text-align:center;background:radial-gradient(ellipse at top,var(--hueso-osc) 0%,var(--hueso) 60%);border-bottom:1px solid var(--borde);}
.hero-foto-wrap{position:relative;width:140px;height:140px;margin:0 auto 24px;}
.hero-foto{width:140px;height:140px;border-radius:50%;object-fit:cover;border:4px solid var(--blanco);box-shadow:0 8px 28px rgba(43,39,35,0.18);display:block;}
.hero-foto-placeholder{width:140px;height:140px;border-radius:50%;background:var(--hueso-osc);border:4px solid var(--blanco);box-shadow:0 8px 28px rgba(43,39,35,0.18);display:flex;align-items:center;justify-content:center;font-size:48px;}

/* Vela decorativa pequeña en la foto */
.vela-deco{position:absolute;bottom:-10px;right:-4px;width:20px;height:32px;}
.vela-deco-cuerpo{width:12px;height:26px;background:linear-gradient(180deg,#FFFDF6 0%,#EFE6D2 100%);border-radius:2px;position:absolute;bottom:0;left:4px;box-shadow:0 2px 6px rgba(43,39,35,0.15);}
.vela-deco-flama{width:8px;height:12px;background:radial-gradient(ellipse at 50% 80%,var(--dorado) 0%,#E8842E 55%,transparent 100%);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;position:absolute;top:-9px;left:6px;transform-origin:bottom center;animation:parpadeo 2.4s ease-in-out infinite;}
@keyframes parpadeo{0%,100%{transform:scaleY(1) rotate(0deg);opacity:1;}25%{transform:scaleY(1.08) rotate(-2deg);opacity:0.92;}50%{transform:scaleY(0.95) rotate(1.5deg);opacity:1;}75%{transform:scaleY(1.05) rotate(-1deg);opacity:0.95;}}
@media(prefers-reduced-motion:reduce){.vela-deco-flama,.veladora-flama{animation:none;}}

.hero-nombre{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(26px,6vw,42px);color:var(--terracota-osc);letter-spacing:-0.01em;margin-bottom:8px;}
.hero-fechas{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--carbon-suave);letter-spacing:0.02em;}
.hero-fechas .sep{color:var(--dorado);margin:0 10px;}
.hero-bio{max-width:520px;margin:18px auto 0;font-size:14.5px;color:var(--carbon-suave);font-style:italic;}

/* VELADORAS */
.veladoras-wrap{margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.btn-veladora{display:flex;align-items:center;gap:10px;padding:12px 22px;background:var(--blanco);border:1.5px solid var(--borde);border-radius:40px;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--carbon);transition:all 0.2s;box-shadow:0 2px 8px rgba(43,39,35,0.07);}
.btn-veladora:hover{border-color:var(--dorado);background:var(--hueso-osc);}
.btn-veladora.encendida{border-color:var(--dorado);background:#FDF8EC;color:var(--terracota-osc);}
.veladora-icono{position:relative;width:24px;height:36px;display:flex;align-items:flex-end;justify-content:center;}
.veladora-cuerpo{width:10px;height:22px;background:linear-gradient(180deg,#FFFDF6,#EFE6D2);border-radius:2px;box-shadow:0 1px 4px rgba(43,39,35,0.12);}
.veladora-flama{width:7px;height:11px;background:radial-gradient(ellipse at 50% 80%,var(--dorado) 0%,#E8842E 55%,transparent 100%);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;position:absolute;top:-8px;left:1.5px;transform-origin:bottom center;opacity:0;transition:opacity 0.4s;}
.btn-veladora.encendida .veladora-flama{opacity:1;animation:parpadeo 2.4s ease-in-out infinite;}
.veladora-contador{font-size:13px;color:var(--carbon-suave);}
.veladoras-nombres{font-size:12.5px;color:var(--carbon-suave);text-align:center;max-width:320px;line-height:1.6;}

/* TABS */
.tabs-nav{position:sticky;top:0;z-index:10;display:flex;background:var(--blanco);border-bottom:1px solid var(--borde);overflow-x:auto;scrollbar-width:none;}
.tabs-nav::-webkit-scrollbar{display:none;}
.tab-btn{flex:1 0 auto;min-width:fit-content;padding:15px 20px;background:none;border:none;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--carbon-suave);cursor:pointer;border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s;white-space:nowrap;}
.tab-btn.activo{color:var(--terracota-osc);border-bottom-color:var(--terracota);}
.tab-panel{display:none;padding:0 0 80px;animation:fadeIn 0.3s ease;}
.tab-panel.activo{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

/* INFO */
.info-wrap{max-width:600px;margin:0 auto;padding:24px 16px;}
.info-bloque{background:var(--blanco);border:1px solid var(--borde);border-radius:10px;padding:20px;margin-bottom:14px;}
.info-bloque-titulo{font-size:11.5px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--sauce);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.info-bloque-titulo::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--sauce);}
.info-fila{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--hueso-osc);gap:12px;}
.info-fila:last-of-type{border-bottom:none;}
.info-etiqueta{font-size:13px;color:var(--carbon-suave);}
.info-valor{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--carbon);font-weight:500;text-align:right;}
.info-ubicacion{font-size:13px;color:var(--carbon-suave);margin-top:6px;}
.reglas-aviso{background:var(--hueso-osc);border-left:3px solid var(--dorado);border-radius:6px;padding:12px 14px;font-size:13px;color:var(--carbon-suave);margin-top:4px;}

/* RECUERDOS (muro tipo chat) */
.recuerdos-wrap{max-width:600px;margin:0 auto;padding:16px 12px;}

/* Formulario nuevo recuerdo */
.form-recuerdo{background:var(--blanco);border:1px solid var(--borde);border-radius:12px;padding:16px;margin-bottom:20px;}
.campo{margin-bottom:12px;}
.campo label{display:block;font-size:11.5px;font-weight:700;color:var(--carbon-suave);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.03em;}
.campo input,.campo textarea{width:100%;padding:10px 12px;border:1px solid var(--borde);border-radius:7px;font-family:'Inter',sans-serif;font-size:14px;color:var(--carbon);background:var(--hueso);}
.campo input:focus,.campo textarea:focus{outline:2px solid var(--terracota);outline-offset:1px;}
.foto-zona{border:2px dashed var(--borde);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;margin-bottom:12px;}
.foto-zona:hover{border-color:var(--terracota);background:var(--hueso-osc);}
.foto-zona input{display:none;}
.foto-zona-texto{font-size:13px;color:var(--carbon-suave);}
.foto-preview{margin-top:10px;position:relative;display:inline-block;}
.foto-preview img{max-width:120px;max-height:120px;border-radius:8px;border:2px solid var(--terracota);display:block;}
.foto-preview-quitar{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--terracota);color:white;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.btn-enviar{width:100%;padding:12px;background:var(--terracota);color:var(--blanco);border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;}
.btn-enviar:hover{background:var(--terracota-osc);}
.btn-enviar:disabled{background:var(--borde);cursor:not-allowed;}
.aviso{margin-top:10px;font-size:13px;padding:10px 13px;border-radius:7px;display:none;}
.aviso.exito{display:block;background:#EEF3EC;color:var(--sauce-osc);}
.aviso.error{display:block;background:#F7E9E6;color:var(--terracota-osc);}

/* Burbujas tipo chat */
.burbuja{display:flex;flex-direction:column;margin-bottom:14px;animation:fadeIn 0.3s ease;}
.burbuja-inner{background:var(--blanco);border:1px solid var(--borde);border-radius:14px 14px 14px 4px;padding:14px;max-width:88%;box-shadow:0 1px 4px rgba(43,39,35,0.06);}
.burbuja-nombre{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--terracota-osc);margin-bottom:6px;}
.burbuja-foto{width:100%;max-width:260px;border-radius:9px;display:block;margin-bottom:8px;border:1px solid var(--borde);}
.burbuja-pie-foto{font-size:12.5px;color:var(--carbon-suave);font-style:italic;margin-bottom:6px;}
.burbuja-texto{font-size:14px;color:var(--carbon);line-height:1.55;}
.burbuja-hora{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--carbon-suave);margin-top:8px;text-align:right;}
.vacio{text-align:center;padding:36px 16px;color:var(--carbon-suave);font-size:13.5px;}

/* VIDEOLLAMADA */
.llamada-wrap{max-width:600px;margin:0 auto;padding:24px 16px;}
.llamada-card{background:var(--blanco);border:1px solid var(--borde);border-left:3px solid var(--sauce);border-radius:10px;padding:18px;margin-bottom:12px;}
.llamada-titulo{font-family:'Fraunces',serif;font-size:17px;color:var(--sauce-osc);margin-bottom:6px;}
.llamada-fecha{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--carbon-suave);margin-bottom:12px;}
.btn-unirse{display:inline-block;padding:10px 18px;background:var(--sauce);color:var(--blanco);text-decoration:none;border-radius:7px;font-size:13px;font-weight:600;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(43,39,35,0.93);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.lightbox.activo{display:flex;}
.lightbox img{max-width:100%;max-height:90vh;border-radius:8px;}

footer{text-align:center;padding:24px 16px;font-size:12px;color:var(--carbon-suave);border-top:1px solid var(--borde);}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-foto-wrap">
    <img id="heroFoto" class="hero-foto" style="display:none;" alt="">
    <div id="heroFotoPlaceholder" class="hero-foto-placeholder">🕊</div>
    <div class="vela-deco" aria-hidden="true">
      <div class="vela-deco-flama"></div>
      <div class="vela-deco-cuerpo"></div>
    </div>
  </div>
  <h1 class="hero-nombre" id="heroNombre">Cargando...</h1>
  <div class="hero-fechas" id="heroFechas"></div>
  <p class="hero-bio" id="heroBio" style="display:none;"></p>

  <!-- VELADORA -->
  <div class="veladoras-wrap">
    <button class="btn-veladora" id="btnVeladora" onclick="toggleVeladora()">
      <div class="veladora-icono">
        <div class="veladora-flama"></div>
        <div class="veladora-cuerpo"></div>
      </div>
      <span id="textoVeladora">Encender una veladora</span>
      <span id="contadorVeladora" style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--carbon-suave);"></span>
    </button>
    <div class="veladoras-nombres" id="nombresVeladora"></div>
  </div>
</div>

<!-- TABS -->
<nav class="tabs-nav" role="tablist">
  <button class="tab-btn activo" data-tab="info">Información</button>
  <button class="tab-btn" data-tab="recuerdos">Recuerdos</button>
  <button class="tab-btn" data-tab="llamada">Videollamada</button>
</nav>

<!-- INFO -->
<section class="tab-panel activo" id="panel-info">
  <div class="info-wrap">
    <div class="info-bloque" id="bloqueCepelio">
      <div class="info-bloque-titulo">Cepelio</div>
      <div class="info-fila"><span class="info-etiqueta">Fecha</span><span class="info-valor" id="fechaCepelio">—</span></div>
      <div class="info-fila"><span class="info-etiqueta">Hora</span><span class="info-valor" id="horaCepelio">—</span></div>
      <div class="info-ubicacion" id="ubicacionCepelio"></div>
    </div>
    <div class="info-bloque" id="bloqueMisa">
      <div class="info-bloque-titulo">Misa</div>
      <div class="info-fila"><span class="info-etiqueta">Fecha</span><span class="info-valor" id="fechaMisa">—</span></div>
      <div class="info-fila"><span class="info-etiqueta">Hora</span><span class="info-valor" id="horaMisa">—</span></div>
      <div class="info-ubicacion" id="ubicacionMisa"></div>
    </div>
    <div class="info-bloque" id="bloqueSalida">
      <div class="info-bloque-titulo">Salida</div>
      <div class="info-fila"><span class="info-etiqueta">Fecha</span><span class="info-valor" id="fechaSalida">—</span></div>
      <div class="info-fila"><span class="info-etiqueta">Hora</span><span class="info-valor" id="horaSalida">—</span></div>
      <div class="info-ubicacion" id="ubicacionSalida"></div>
    </div>
    <div class="reglas-aviso" id="reglasAviso" style="display:none;"></div>
  </div>
</section>

<!-- RECUERDOS -->
<section class="tab-panel" id="panel-recuerdos">
  <div class="recuerdos-wrap">
    <div class="form-recuerdo">
      <div class="campo">
        <label for="recNombre">Tu nombre</label>
        <input type="text" id="recNombre" maxlength="60" placeholder="¿Cómo te llamas?">
      </div>
      <div class="campo">
        <label for="recMensaje">Tu mensaje (opcional si subes foto)</label>
        <textarea id="recMensaje" maxlength="500" rows="3" placeholder="Comparte un recuerdo o palabras de cariño..."></textarea>
      </div>
      <label class="foto-zona" id="fotoZona">
        <div class="foto-zona-texto">📷 Toca para agregar una foto (opcional)</div>
        <input type="file" id="inputFoto" accept="image/*">
      </label>
      <div id="fotoPreviewWrap" style="display:none;text-align:center;margin-bottom:12px;">
        <div class="foto-preview">
          <img id="fotoPreviewImg" src="" alt="">
          <button class="foto-preview-quitar" onclick="quitarFoto()">×</button>
        </div>
        <div class="campo" style="margin-top:10px;">
          <label for="recPieFoto">Pie de foto (opcional)</label>
          <input type="text" id="recPieFoto" maxlength="120" placeholder="Ej. En su cumpleaños de 1998...">
        </div>
      </div>
      <button class="btn-enviar" id="btnEnviar">Publicar recuerdo</button>
      <div class="aviso" id="avisoRecuerdo"></div>
    </div>
    <div id="listaRecuerdos"></div>
  </div>
</section>

<!-- VIDEOLLAMADA -->
<section class="tab-panel" id="panel-llamada">
  <div class="llamada-wrap">
    <div id="listaLlamadas"></div>
  </div>
</section>

<footer>Página de homenaje · creada con cariño para acompañar a quienes no pudieron estar presentes</footer>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwgdRjqbuIJSYaBhjRNRpi8FdOEcQr7OgLg-jRsgSf9Sorutm37R2IqDO6pA6XX0kqE7Q/exec" ;
const params = new URLSearchParams(window.location.search);
const slug = params.get('p');
let servicioActual = null;
let fotoBase64 = null;

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activo'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('activo'));
    btn.classList.add('activo');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('activo');
  });
});

// ===== UTILIDADES =====
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function formatearFecha(s) {
  if (!s || String(s).includes('1899')) return '—';
  try {
    const str = String(s);
    if (str.includes('T')) {
      const parte = str.split('T')[0];
      if (parte.includes('1899')) return '—';
      const [y,m,d] = parte.split('-');
      return new Date(+y,+m-1,+d).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
    }
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
      const [y,m,d] = str.split('-');
      return new Date(+y,+m-1,+d).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
    }
    return str;
  } catch(e){return '—';}
}

function formatearHora(s) {
  if (!s || String(s).includes('1899')) return '—';
  try {
    const str = String(s);
    if (str.includes('T')) {
      const f = new Date(str);
      return String(f.getUTCHours()).padStart(2,'0')+':'+String(f.getUTCMinutes()).padStart(2,'0');
    }
    return str;
  } catch(e){return s;}
}

function horaCorta(iso) {
  try {
    const f = new Date(iso);
    return f.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  } catch(e){return '';}
}

async function api(accion, datos, metodo='GET') {
  if (metodo === 'GET') {
    const r = await fetch(API_URL + '?' + new URLSearchParams({accion,...datos}));
    return r.json();
  }
  const r = await fetch(API_URL, {method:'POST', body:JSON.stringify({accion,...datos})});
  return r.json();
}

// ===== CARGAR SERVICIO =====
async function cargarServicio() {
  if (!slug) { document.getElementById('heroNombre').textContent = 'Página no especificada'; return; }
  const resp = await api('obtenerServicioPublico', {slug});
  if (!resp.ok) { document.getElementById('heroNombre').textContent = 'Página no encontrada'; return; }
  servicioActual = resp.servicio;
  pintarHero(servicioActual);
  pintarInfo(servicioActual);
  cargarRecuerdos();
  cargarLlamadas();
  cargarVeladoras();
}

function pintarHero(s) {
  document.getElementById('heroNombre').textContent = s.nombreFinado;
  if (s.fotoUrl) {
    const img = document.getElementById('heroFoto');
    img.src = s.fotoUrl; img.style.display = 'block';
    document.getElementById('heroFotoPlaceholder').style.display = 'none';
  }
  const nac = formatearFecha(s.fechaNacimiento);
  const def = formatearFecha(s.fechaDefuncion);
  document.getElementById('heroFechas').innerHTML = `${nac}<span class="sep">·</span>${def}`;
  if (s.biografia) {
    const b = document.getElementById('heroBio');
    b.textContent = s.biografia; b.style.display = 'block';
  }
}

function pintarInfo(s) {
  const bloques = [
    {prefijo:'Cepelio', fecha:s.fechaCepelio, hora:s.horaCepelio, ubic:s.ubicacionCepelio},
    {prefijo:'Misa',    fecha:s.fechaMisa,    hora:s.horaMisa,    ubic:s.ubicacionMisa},
    {prefijo:'Salida',  fecha:s.fechaSalida,  hora:s.horaSalida,  ubic:s.ubicacionSalida}
  ];
  bloques.forEach(b => {
    const tiene = b.fecha || b.hora || b.ubic;
    const el = document.getElementById('bloque'+b.prefijo);
    if (!tiene) { el.style.display='none'; return; }
    document.getElementById('fecha'+b.prefijo).textContent = formatearFecha(b.fecha);
    document.getElementById('hora'+b.prefijo).textContent = formatearHora(b.hora);
    document.getElementById('ubicacion'+b.prefijo).textContent = b.ubic || '';
  });
  const reg = s.reglasPublicacion;
  if (reg) {
    const av = document.getElementById('reglasAviso');
    av.textContent = reg; av.style.display = 'block';
  }
}

// ===== VELADORAS =====
async function cargarVeladoras() {
  const resp = await api('obtenerVeladoras', {servicioId: servicioActual.id});
  if (!resp.ok) return;
  actualizarUIVeladoras(resp.total, resp.nombres);
  const yaEncendio = localStorage.getItem('veladora_' + servicioActual.id);
  if (yaEncendio) {
    document.getElementById('btnVeladora').classList.add('encendida');
    document.getElementById('textoVeladora').textContent = 'Veladora encendida';
  }
}

function actualizarUIVeladoras(total, nombres) {
  document.getElementById('contadorVeladora').textContent = total > 0 ? total : '';
  if (nombres && nombres.length > 0) {
    const texto = nombres.slice(0,8).join(', ') + (nombres.length > 8 ? ` y ${nombres.length-8} más` : '');
    document.getElementById('nombresVeladora').textContent = `🕯 ${texto} han encendido una veladora`;
  }
}

async function toggleVeladora() {
  const yaEncendio = localStorage.getItem('veladora_' + servicioActual.id);
  if (yaEncendio) return; // solo una vez

  const nombre = prompt('¿Cuál es tu nombre para encender la veladora?');
  if (!nombre || !nombre.trim()) return;

  const resp = await api('encenderVeladora', {
    servicioId: servicioActual.id,
    nombre: nombre.trim()
  }, 'POST');

  if (resp.ok) {
    localStorage.setItem('veladora_' + servicioActual.id, '1');
    document.getElementById('btnVeladora').classList.add('encendida');
    document.getElementById('textoVeladora').textContent = 'Veladora encendida';
    actualizarUIVeladoras(resp.total, resp.nombres);
  }
}

// ===== RECUERDOS (condolencias + fotos unificadas) =====
document.getElementById('inputFoto').addEventListener('change', (e) => {
  const archivo = e.target.files[0];
  if (!archivo) return;
  const lector = new FileReader();
  lector.onload = (ev) => {
    fotoBase64 = ev.target.result;
    document.getElementById('fotoPreviewImg').src = fotoBase64;
    document.getElementById('fotoPreviewWrap').style.display = 'block';
    document.getElementById('fotoZona').style.display = 'none';
  };
  lector.readAsDataURL(archivo);
});

function quitarFoto() {
  fotoBase64 = null;
  document.getElementById('inputFoto').value = '';
  document.getElementById('fotoPreviewWrap').style.display = 'none';
  document.getElementById('fotoZona').style.display = 'block';
}

document.getElementById('btnEnviar').addEventListener('click', async () => {
  const nombre = document.getElementById('recNombre').value.trim();
  const mensaje = document.getElementById('recMensaje').value.trim();
  const pieFoto = document.getElementById('recPieFoto').value.trim();
  const aviso = document.getElementById('avisoRecuerdo');
  const btn = document.getElementById('btnEnviar');

  if (!nombre) { aviso.className='aviso error'; aviso.textContent='Por favor escribe tu nombre.'; return; }
  if (!mensaje && !fotoBase64) { aviso.className='aviso error'; aviso.textContent='Escribe un mensaje o agrega una foto.'; return; }

  btn.disabled = true;
  btn.textContent = fotoBase64 ? 'Subiendo foto...' : 'Publicando...';

  try {
    const resp = await api('publicarRecuerdo', {
      servicioId: servicioActual.id,
      nombre,
      mensaje,
      pieFoto,
      imagenBase64: fotoBase64 || null,
      tipoMime: 'image/jpeg'
    }, 'POST');

    if (resp.ok) {
      aviso.className = 'aviso exito';
      aviso.textContent = '✓ Tu recuerdo fue enviado. Aparecerá tras ser revisado por la funeraria.';
      document.getElementById('recNombre').value = '';
      document.getElementById('recMensaje').value = '';
      document.getElementById('recPieFoto').value = '';
      quitarFoto();
    } else {
      aviso.className = 'aviso error';
      aviso.textContent = resp.error || 'Ocurrió un error. Intenta de nuevo.';
    }
  } catch(e) {
    aviso.className = 'aviso error';
    aviso.textContent = 'No se pudo conectar. Verifica tu internet.';
  }
  btn.disabled = false;
  btn.textContent = 'Publicar recuerdo';
});

async function cargarRecuerdos() {
  const resp = await api('obtenerRecuerdos', {servicioId: servicioActual.id});
  const lista = document.getElementById('listaRecuerdos');
  if (!resp.ok || !resp.recuerdos || resp.recuerdos.length === 0) {
    lista.innerHTML = '<div class="vacio">Aún no hay recuerdos compartidos.<br>Sé el primero en dejar uno.</div>';
    return;
  }
  lista.innerHTML = resp.recuerdos.map(r => `
    <div class="burbuja">
      <div class="burbuja-inner">
        <div class="burbuja-nombre">${esc(r.nombre)}</div>
        ${r.urlFoto ? `<img class="burbuja-foto" src="${esc(r.urlFoto)}" alt="Foto de ${esc(r.nombre)}" onclick="abrirLightbox('${esc(r.urlFoto)}')" loading="lazy">` : ''}
        ${r.pieFoto ? `<div class="burbuja-pie-foto">${esc(r.pieFoto)}</div>` : ''}
        ${r.mensaje ? `<div class="burbuja-texto">${esc(r.mensaje)}</div>` : ''}
        <div class="burbuja-hora">${horaCorta(r.creadoEn)}</div>
      </div>
    </div>
  `).join('');
}

// ===== VIDEOLLAMADAS =====
async function cargarLlamadas() {
  const resp = await api('obtenerVideoLlamadas', {servicioId: servicioActual.id});
  const lista = document.getElementById('listaLlamadas');
  if (!resp.ok || resp.videoLlamadas.length === 0) {
    lista.innerHTML = '<div class="vacio">No hay videollamadas programadas por ahora.</div>';
    return;
  }
  lista.innerHTML = resp.videoLlamadas.map(v => `
    <div class="llamada-card">
      <div class="llamada-titulo">${esc(v.titulo)}</div>
      <div class="llamada-fecha">${formatearFecha(v.fecha)} · ${v.hora} hrs</div>
      <a href="${esc(v.enlace)}" target="_blank" rel="noopener" class="btn-unirse">Unirse a la videollamada →</a>
    </div>
  `).join('');
}

// ===== LIGHTBOX =====
function abrirLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('activo');
}
document.getElementById('lightbox').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('activo');
});

cargarServicio();
</script>
</body>
</html>
