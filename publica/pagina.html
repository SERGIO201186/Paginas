<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>En memoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --hueso:#FAF6F0;
    --hueso-osc:#F1E9DD;
    --terracota:#7A4A3A;
    --terracota-osc:#5E3A2D;
    --dorado:#C9A24B;
    --carbon:#2B2723;
    --carbon-suave:#56504A;
    --sauce:#5C6B57;
    --sauce-osc:#43503F;
    --borde:#E3D9C8;
    --blanco:#FFFFFF;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background:var(--hueso);
    color:var(--carbon);
    font-family:'Inter',sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== HERO ===== */
  .hero{
    position:relative;
    padding:64px 24px 48px;
    text-align:center;
    background:
      radial-gradient(ellipse at top, var(--hueso-osc) 0%, var(--hueso) 60%);
    border-bottom:1px solid var(--borde);
  }

  .hero-foto-wrap{
    position:relative;
    width:148px;
    height:148px;
    margin:0 auto 28px;
  }

  .hero-foto{
    width:148px;
    height:148px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid var(--blanco);
    box-shadow:0 8px 28px rgba(43,39,35,0.18);
    display:block;
  }

  .hero-foto-placeholder{
    width:148px;
    height:148px;
    border-radius:50%;
    background:var(--hueso-osc);
    border:4px solid var(--blanco);
    box-shadow:0 8px 28px rgba(43,39,35,0.18);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fraunces',serif;
    font-size:48px;
    color:var(--terracota);
  }

  /* Vela - elemento de firma */
  .vela{
    position:absolute;
    bottom:-14px;
    right:-6px;
    width:22px;
    height:34px;
  }

  .vela-cuerpo{
    width:14px;
    height:30px;
    background:linear-gradient(180deg, #FFFDF6 0%, #EFE6D2 100%);
    border-radius:2px;
    position:absolute;
    bottom:0;
    left:4px;
    box-shadow:0 2px 6px rgba(43,39,35,0.15);
  }

  .vela-flama{
    width:9px;
    height:14px;
    background:radial-gradient(ellipse at 50% 80%, var(--dorado) 0%, #E8842E 55%, transparent 100%);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    position:absolute;
    top:-10px;
    left:6.5px;
    transform-origin:bottom center;
    animation:parpadeo 2.4s ease-in-out infinite;
  }

  @keyframes parpadeo{
    0%,100%{ transform:scaleY(1) rotate(0deg); opacity:1; }
    25%{ transform:scaleY(1.08) rotate(-2deg); opacity:0.92; }
    50%{ transform:scaleY(0.95) rotate(1.5deg); opacity:1; }
    75%{ transform:scaleY(1.05) rotate(-1deg); opacity:0.95; }
  }

  @media (prefers-reduced-motion: reduce){
    .vela-flama{ animation:none; }
  }

  .hero-nombre{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:clamp(28px, 6vw, 44px);
    color:var(--terracota-osc);
    letter-spacing:-0.01em;
    margin-bottom:10px;
  }

  .hero-fechas{
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    color:var(--carbon-suave);
    letter-spacing:0.02em;
  }

  .hero-fechas .separador{
    color:var(--dorado);
    margin:0 10px;
  }

  .hero-bio{
    max-width:560px;
    margin:22px auto 0;
    font-size:15px;
    color:var(--carbon-suave);
    font-style:italic;
  }

  /* ===== TABS ===== */
  .tabs-nav{
    position:sticky;
    top:0;
    z-index:10;
    display:flex;
    background:var(--blanco);
    border-bottom:1px solid var(--borde);
    overflow-x:auto;
    scrollbar-width:none;
  }
  .tabs-nav::-webkit-scrollbar{ display:none; }

  .tab-btn{
    flex:1 0 auto;
    min-width:fit-content;
    padding:16px 20px;
    background:none;
    border:none;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.03em;
    text-transform:uppercase;
    color:var(--carbon-suave);
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:color 0.2s, border-color 0.2s;
    white-space:nowrap;
  }

  .tab-btn:focus-visible{
    outline:2px solid var(--terracota);
    outline-offset:-2px;
  }

  .tab-btn.activo{
    color:var(--terracota-osc);
    border-bottom-color:var(--terracota);
  }

  .tab-panel{
    display:none;
    padding:36px 20px 64px;
    max-width:640px;
    margin:0 auto;
    animation:fadeIn 0.35s ease;
  }
  .tab-panel.activo{ display:block; }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    .tab-panel{ animation:none; }
  }

  /* ===== INFO TAB ===== */
  .info-bloque{
    background:var(--blanco);
    border:1px solid var(--borde);
    border-radius:10px;
    padding:22px 24px;
    margin-bottom:16px;
  }

  .info-bloque-titulo{
    font-family:'Inter',sans-serif;
    font-size:12px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--sauce);
    margin-bottom:14px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .info-bloque-titulo::before{
    content:'';
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--sauce);
  }

  .info-fila{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:8px 0;
    border-bottom:1px solid var(--hueso-osc);
    gap:16px;
  }
  .info-fila:last-child{ border-bottom:none; }

  .info-etiqueta{
    font-size:13px;
    color:var(--carbon-suave);
    flex-shrink:0;
  }

  .info-valor{
    font-family:'JetBrains Mono',monospace;
    font-size:13.5px;
    color:var(--carbon);
    text-align:right;
    font-weight:500;
  }

  .info-ubicacion{
    font-size:13px;
    color:var(--carbon-suave);
    margin-top:4px;
    line-height:1.5;
  }

  .reglas-aviso{
    background:var(--hueso-osc);
    border-left:3px solid var(--dorado);
    border-radius:6px;
    padding:14px 16px;
    font-size:13px;
    color:var(--carbon-suave);
    margin-top:8px;
  }

  /* ===== CONDOLENCIAS TAB ===== */
  .form-condolencia{
    background:var(--blanco);
    border:1px solid var(--borde);
    border-radius:10px;
    padding:22px;
    margin-bottom:28px;
  }

  .campo{
    margin-bottom:14px;
  }

  .campo label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--carbon-suave);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:0.03em;
  }

  .campo input, .campo textarea{
    width:100%;
    padding:11px 13px;
    border:1px solid var(--borde);
    border-radius:7px;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    color:var(--carbon);
    background:var(--hueso);
    resize:vertical;
  }

  .campo input:focus, .campo textarea:focus{
    outline:2px solid var(--terracota);
    outline-offset:1px;
    border-color:var(--terracota);
  }

  .btn-principal{
    width:100%;
    padding:13px;
    background:var(--terracota);
    color:var(--blanco);
    border:none;
    border-radius:7px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background 0.2s;
  }
  .btn-principal:hover{ background:var(--terracota-osc); }
  .btn-principal:disabled{ background:var(--borde); cursor:not-allowed; }

  .aviso-estado{
    margin-top:12px;
    font-size:13px;
    padding:10px 14px;
    border-radius:7px;
    display:none;
  }
  .aviso-estado.exito{
    display:block;
    background:#EEF3EC;
    color:var(--sauce-osc);
  }
  .aviso-estado.error{
    display:block;
    background:#F7E9E6;
    color:var(--terracota-osc);
  }

  .condolencia-item{
    padding:18px 0;
    border-bottom:1px solid var(--borde);
  }
  .condolencia-item:last-child{ border-bottom:none; }

  .condolencia-nombre{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:16px;
    color:var(--terracota-osc);
    margin-bottom:4px;
  }

  .condolencia-mensaje{
    font-size:14.5px;
    color:var(--carbon);
  }

  .condolencia-fecha{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--carbon-suave);
    margin-top:6px;
  }

  .vacio{
    text-align:center;
    padding:40px 20px;
    color:var(--carbon-suave);
    font-size:14px;
  }

  /* ===== FOTOS TAB ===== */
  .galeria{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
    margin-top:24px;
  }

  .galeria img{
    width:100%;
    aspect-ratio:1;
    object-fit:cover;
    border-radius:8px;
    border:1px solid var(--borde);
    cursor:pointer;
  }

  .galeria-pie{
    font-size:11px;
    color:var(--carbon-suave);
    margin-top:4px;
    text-align:center;
  }

  .foto-upload-zona{
    border:2px dashed var(--borde);
    border-radius:10px;
    padding:24px;
    text-align:center;
    cursor:pointer;
    transition:border-color 0.2s, background 0.2s;
  }
  .foto-upload-zona:hover{
    border-color:var(--terracota);
    background:var(--hueso-osc);
  }

  .foto-upload-zona input{ display:none; }

  .foto-upload-icono{
    font-size:28px;
    color:var(--terracota);
    margin-bottom:8px;
  }

  .foto-upload-texto{
    font-size:13.5px;
    color:var(--carbon-suave);
  }

  .preview-foto{
    margin-top:14px;
    text-align:center;
  }
  .preview-foto img{
    max-width:160px;
    max-height:160px;
    border-radius:8px;
    border:2px solid var(--terracota);
  }

  /* ===== VIDEOLLAMADA TAB ===== */
  .llamada-card{
    background:var(--blanco);
    border:1px solid var(--borde);
    border-left:3px solid var(--sauce);
    border-radius:10px;
    padding:20px;
    margin-bottom:14px;
  }

  .llamada-titulo{
    font-family:'Fraunces',serif;
    font-size:18px;
    color:var(--sauce-osc);
    margin-bottom:8px;
  }

  .llamada-fecha{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--carbon-suave);
    margin-bottom:14px;
  }

  .llamada-link{
    display:inline-block;
    padding:10px 18px;
    background:var(--sauce);
    color:var(--blanco);
    text-decoration:none;
    border-radius:7px;
    font-size:13.5px;
    font-weight:600;
  }
  .llamada-link:hover{ background:var(--sauce-osc); }

  /* ===== MODAL LIGHTBOX ===== */
  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(43,39,35,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:24px;
  }
  .lightbox.activo{ display:flex; }
  .lightbox img{
    max-width:100%;
    max-height:100%;
    border-radius:8px;
  }

  footer{
    text-align:center;
    padding:28px 20px;
    font-size:12px;
    color:var(--carbon-suave);
    border-top:1px solid var(--borde);
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-foto-wrap">
    <img id="heroFoto" class="hero-foto" style="display:none;" alt="">
    <div id="heroFotoPlaceholder" class="hero-foto-placeholder">🕊</div>
    <div class="vela" aria-hidden="true">
      <div class="vela-flama"></div>
      <div class="vela-cuerpo"></div>
    </div>
  </div>
  <h1 class="hero-nombre" id="heroNombre">Cargando...</h1>
  <div class="hero-fechas" id="heroFechas"></div>
  <p class="hero-bio" id="heroBio" style="display:none;"></p>
</div>

<nav class="tabs-nav" role="tablist">
  <button class="tab-btn activo" data-tab="info" role="tab">Información</button>
  <button class="tab-btn" data-tab="condolencias" role="tab">Condolencias</button>
  <button class="tab-btn" data-tab="fotos" role="tab">Fotos</button>
  <button class="tab-btn" data-tab="llamada" role="tab">Videollamada</button>
</nav>

<!-- INFO -->
<section class="tab-panel activo" id="panel-info">
  <div class="info-bloque" id="bloqueCepelio">
    <div class="info-bloque-titulo">Cepelio</div>
    <div class="info-fila"><span class="info-etiqueta">Fecha</span><span class="info-valor" id="fechaCepelio">—</span></div>
    <div class="info-fila"><span class="info-etiqueta">Hora</span><span class="info-valor" id="horaCepelio">—</span></div>
    <div class="info-ubicacion" id="ubicacionCepelio"></div>
  </div>

  <div class="info-bloque" id="bloqueMisa">
    <div class="info-bloque-titulo">Misa</div>
    <div class="info-fila"><span class="info-etiqueta">Fecha</span><span class="info-valor" id="fechaMisa">—</span></div>
    <div class="info-fila"><span class="info-etiqueta">Hora</span><span class="info-valor" id="horaMisa">—</span></div>
    <div class="info-ubicacion" id="ubicacionMisa"></div>
  </div>

  <div class="info-bloque" id="bloqueSalida">
    <div class="info-bloque-titulo">Salida</div>
    <div class="info-fila"><span class="info-etiqueta">Fecha</span><span class="info-valor" id="fechaSalida">—</span></div>
    <div class="info-fila"><span class="info-etiqueta">Hora</span><span class="info-valor" id="horaSalida">—</span></div>
    <div class="info-ubicacion" id="ubicacionSalida"></div>
  </div>

  <div class="reglas-aviso" id="reglasAviso" style="display:none;"></div>
</section>

<!-- CONDOLENCIAS -->
<section class="tab-panel" id="panel-condolencias">
  <form class="form-condolencia" id="formCondolencia">
    <div class="campo">
      <label for="condNombre">Tu nombre</label>
      <input type="text" id="condNombre" required maxlength="60" placeholder="¿Cómo te llamas?">
    </div>
    <div class="campo">
      <label for="condMensaje">Tu mensaje</label>
      <textarea id="condMensaje" required maxlength="500" rows="4" placeholder="Comparte un recuerdo o palabras de cariño..."></textarea>
    </div>
    <button type="submit" class="btn-principal" id="btnEnviarCondolencia">Enviar condolencia</button>
    <div class="aviso-estado" id="avisoCondolencia"></div>
  </form>

  <div id="listaCondolencias"></div>
</section>

<!-- FOTOS -->
<section class="tab-panel" id="panel-fotos">
  <label class="foto-upload-zona" id="zonaUpload">
    <div class="foto-upload-icono">📷</div>
    <div class="foto-upload-texto">Toca para subir una foto de recuerdo</div>
    <input type="file" id="inputFoto" accept="image/*">
  </label>

  <div class="campo" style="margin-top:14px;">
    <label for="fotoNombre">Tu nombre</label>
    <input type="text" id="fotoNombre" maxlength="60" placeholder="¿Quién comparte esta foto?">
  </div>

  <div class="preview-foto" id="previewFoto" style="display:none;"></div>

  <button class="btn-principal" id="btnSubirFoto" style="margin-top:14px;" disabled>Subir foto</button>
  <div class="aviso-estado" id="avisoFoto"></div>

  <div class="galeria" id="galeria"></div>
</section>

<!-- VIDEOLLAMADA -->
<section class="tab-panel" id="panel-llamada">
  <div id="listaLlamadas"></div>
</section>

<footer>Página de homenaje · creada con cariño para acompañar a quienes no pudieron estar presentes</footer>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  // ============================================================
  // CONFIGURACIÓN: pega aquí la URL de tu Web App de Apps Script
  // ============================================================
  const API_URL = "PEGA_AQUI_TU_URL_DE_APPS_SCRIPT";

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('p'); // ej: pagina.html?p=juan-perez-a1b2c
  let servicioActual = null;

  // ===== TABS =====
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activo'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('activo'));
      btn.classList.add('activo');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('activo');
    });
  });

  // ===== UTILIDADES =====
  function formatearFecha(fechaStr) {
    if (!fechaStr) return '—';
    try {
      const f = new Date(fechaStr + 'T00:00:00');
      return f.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch (e) { return fechaStr; }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function llamarAPI(accion, datos, metodo) {
    if (metodo === 'GET') {
      const qs = new URLSearchParams({ accion, ...datos }).toString();
      const resp = await fetch(`${API_URL}?${qs}`);
      return resp.json();
    } else {
      const resp = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ accion, ...datos })
      });
      return resp.json();
    }
  }

  // ===== CARGAR SERVICIO =====
  async function cargarServicio() {
    if (!slug) {
      document.getElementById('heroNombre').textContent = 'Página no especificada';
      return;
    }
    const resp = await llamarAPI('obtenerServicioPublico', { slug }, 'GET');
    if (!resp.ok) {
      document.getElementById('heroNombre').textContent = 'Página no encontrada';
      return;
    }
    servicioActual = resp.servicio;
    pintarHero(servicioActual);
    pintarInfo(servicioActual);
    cargarCondolencias();
    cargarFotos();
    cargarLlamadas();
  }

  function pintarHero(s) {
    document.getElementById('heroNombre').textContent = s.nombreFinado;

    if (s.fotoUrl) {
      const img = document.getElementById('heroFoto');
      img.src = s.fotoUrl;
      img.style.display = 'block';
      document.getElementById('heroFotoPlaceholder').style.display = 'none';
    }

    const nac = formatearFecha(s.fechaNacimiento);
    const def = formatearFecha(s.fechaDefuncion);
    document.getElementById('heroFechas').innerHTML =
      `${nac} <span class="separador">·</span> ${def}`;

    if (s.biografia) {
      const bio = document.getElementById('heroBio');
      bio.textContent = s.biografia;
      bio.style.display = 'block';
    }
  }

  function pintarInfo(s) {
    const bloques = [
      { prefijo: 'Cepelio', fecha: s.fechaCepelio, hora: s.horaCepelio, ubic: s.ubicacionCepelio },
      { prefijo: 'Misa', fecha: s.fechaMisa, hora: s.horaMisa, ubic: s.ubicacionMisa },
      { prefijo: 'Salida', fecha: s.fechaSalida, hora: s.horaSalida, ubic: s.ubicacionSalida }
    ];
    bloques.forEach(b => {
      const tieneInfo = b.fecha || b.hora || b.ubic;
      const bloqueEl = document.getElementById('bloque' + b.prefijo);
      if (!tieneInfo) {
        bloqueEl.style.display = 'none';
        return;
      }
      document.getElementById('fecha' + b.prefijo).textContent = formatearFecha(b.fecha);
      document.getElementById('hora' + b.prefijo).textContent = b.hora || '—';
      document.getElementById('ubicacion' + b.prefijo).textContent = b.ubic || '';
    });

    if (s.reglasPublicacion) {
      const aviso = document.getElementById('reglasAviso');
      aviso.textContent = s.reglasPublicacion;
      aviso.style.display = 'block';
    }
  }

  // ===== CONDOLENCIAS =====
  document.getElementById('formCondolencia').addEventListener('submit', async (e) => {
    e.preventDefault();
    const nombre = document.getElementById('condNombre').value.trim();
    const mensaje = document.getElementById('condMensaje').value.trim();
    const btn = document.getElementById('btnEnviarCondolencia');
    const aviso = document.getElementById('avisoCondolencia');

    btn.disabled = true;
    btn.textContent = 'Enviando...';

    try {
      const resp = await llamarAPI('publicarCondolencia', {
        servicioId: servicioActual.id, nombre, mensaje
      }, 'POST');

      if (resp.ok) {
        aviso.className = 'aviso-estado exito';
        aviso.textContent = resp.mensaje;
        document.getElementById('formCondolencia').reset();
      } else {
        aviso.className = 'aviso-estado error';
        aviso.textContent = resp.error || 'Ocurrió un error, intenta de nuevo.';
      }
    } catch (err) {
      aviso.className = 'aviso-estado error';
      aviso.textContent = 'No se pudo conectar. Intenta de nuevo.';
    }

    btn.disabled = false;
    btn.textContent = 'Enviar condolencia';
  });

  async function cargarCondolencias() {
    const resp = await llamarAPI('obtenerCondolencias', { servicioId: servicioActual.id }, 'GET');
    const lista = document.getElementById('listaCondolencias');
    if (!resp.ok || resp.condolencias.length === 0) {
      lista.innerHTML = '<div class="vacio">Aún no hay condolencias. Sé el primero en dejar unas palabras.</div>';
      return;
    }
    lista.innerHTML = resp.condolencias.map(c => `
      <div class="condolencia-item">
        <div class="condolencia-nombre">${escapeHtml(c.nombre)}</div>
        <div class="condolencia-mensaje">${escapeHtml(c.mensaje)}</div>
      </div>
    `).join('');
  }

  // ===== FOTOS =====
  let archivoFotoBase64 = null;

  document.getElementById('inputFoto').addEventListener('change', (e) => {
    const archivo = e.target.files[0];
    if (!archivo) return;

    const lector = new FileReader();
    lector.onload = (ev) => {
      archivoFotoBase64 = ev.target.result;
      const preview = document.getElementById('previewFoto');
      preview.innerHTML = `<img src="${archivoFotoBase64}" alt="Vista previa">`;
      preview.style.display = 'block';
      document.getElementById('btnSubirFoto').disabled = false;
    };
    lector.readAsDataURL(archivo);
  });

  document.getElementById('btnSubirFoto').addEventListener('click', async () => {
    const btn = document.getElementById('btnSubirFoto');
    const aviso = document.getElementById('avisoFoto');
    const nombrePersona = document.getElementById('fotoNombre').value.trim() || 'Anónimo';

    btn.disabled = true;
    btn.textContent = 'Subiendo...';

    try {
      const resp = await llamarAPI('subirFoto', {
        servicioId: servicioActual.id,
        nombrePersona,
        imagenBase64: archivoFotoBase64,
        tipoMime: 'image/jpeg'
      }, 'POST');

      if (resp.ok) {
        aviso.className = 'aviso-estado exito';
        aviso.textContent = resp.mensaje;
        document.getElementById('previewFoto').style.display = 'none';
        document.getElementById('fotoNombre').value = '';
        archivoFotoBase64 = null;
      } else {
        aviso.className = 'aviso-estado error';
        aviso.textContent = resp.error || 'No se pudo subir la foto.';
      }
    } catch (err) {
      aviso.className = 'aviso-estado error';
      aviso.textContent = 'No se pudo conectar. Intenta de nuevo.';
    }

    btn.disabled = false;
    btn.textContent = 'Subir foto';
  });

  async function cargarFotos() {
    const resp = await llamarAPI('obtenerFotos', { servicioId: servicioActual.id }, 'GET');
    const galeria = document.getElementById('galeria');
    if (!resp.ok || resp.fotos.length === 0) {
      galeria.innerHTML = '';
      return;
    }
    galeria.innerHTML = resp.fotos.map(f => `
      <div>
        <img src="${f.urlPublica}" alt="Foto de ${escapeHtml(f.nombrePersona)}" loading="lazy" onclick="abrirLightbox('${f.urlPublica}')">
        <div class="galeria-pie">${escapeHtml(f.nombrePersona)}</div>
      </div>
    `).join('');
  }

  function abrirLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('activo');
  }
  document.getElementById('lightbox').addEventListener('click', () => {
    document.getElementById('lightbox').classList.remove('activo');
  });

  // ===== VIDEOLLAMADAS =====
  async function cargarLlamadas() {
    const resp = await llamarAPI('obtenerVideoLlamadas', { servicioId: servicioActual.id }, 'GET');
    const lista = document.getElementById('listaLlamadas');
    if (!resp.ok || resp.videoLlamadas.length === 0) {
      lista.innerHTML = '<div class="vacio">No hay videollamadas programadas por ahora.</div>';
      return;
    }
    lista.innerHTML = resp.videoLlamadas.map(v => `
      <div class="llamada-card">
        <div class="llamada-titulo">${escapeHtml(v.titulo)}</div>
        <div class="llamada-fecha">${formatearFecha(v.fecha)} · ${v.hora} hrs</div>
        <a href="${v.enlace}" target="_blank" rel="noopener" class="llamada-link">Unirse a la videollamada →</a>
      </div>
    `).join('');
  }

  cargarServicio();
</script>

</body>
</html>
